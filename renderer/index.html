<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>GameLibraryTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-container">
    <h1 class="login-title">Game Tracker</h1>
    <div class="login-box">
      <input id="username" placeholder="Username"/>
      <input id="password" placeholder="Password" type="password"/>
      <button onclick="login()">Login</button>
      <p class="login-register">
        Don't have an account?
        <a onclick="window.electronAPI.openExternal('http://127.0.0.1:5500/frontend/index.html')" href="#">Register</a>
      </p>
      <p id="login-error"></p>
    </div>
  </div>

<!-- MAIN SCREEN -->
<div id="main-screen" style="display: none;">
  <div class="header">
    <span class="header-logo">game<span>.</span>tracker</span>
    <div class="header-right">
      <span id="username-display"></span>
      <button onclick="logout()">Logout</button>
      <button onclick="loadGames()">↻</button>
    </div>
  </div>

  <div id="active-game-status" class="active-game-banner" style="display: none;">
    ▶ <b id="active-game-name"></b>
    <span id="active-game-timer">0h 0m</span>
  </div>

  <div class="content">
    <div id="games-list"></div>
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
